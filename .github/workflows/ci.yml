name: .NET CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore CommunityLibraryDesk1.sln

      - name: Build
        run: dotnet build CommunityLibraryDesk1.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test CommunityLibraryDesk1.sln --no-build --configuration Release --verbosity normal
